<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1C1F24">
  <title>Garage Toolbox</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="../core/css/core.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <header class="topbar">
    <span class="topbar-brand" id="brandName">GARAGE TOOLBOX</span>
    <span class="topbar-badge" id="offlineBadge" hidden>OFFLINE</span>
  </header>

  <main id="screen" class="screen">
    <!-- ekrani se renderuju ovde -->
  </main>

  <nav class="bottomnav" id="bottomNav">
    <button class="nav-btn" data-route="home">
      <span class="nav-ico">⌂</span><span class="nav-label" data-i18n="nav.home">Početna</span>
    </button>
    <button class="nav-btn" data-route="vehicles">
      <span class="nav-ico">🚗</span><span class="nav-label" data-i18n="nav.vehicles">Vozila</span>
    </button>
    <button class="nav-btn nav-btn-primary" data-route="new_job">
      <span class="nav-ico">＋</span><span class="nav-label" data-i18n="nav.new_job">Novi posao</span>
    </button>
    <button class="nav-btn" data-route="contacts">
      <span class="nav-ico">☎</span><span class="nav-label" data-i18n="nav.contacts">Kontakti</span>
    </button>
    <button class="nav-btn" data-route="dnevnik">
      <span class="nav-ico">📅</span><span class="nav-label">Dnevnik</span>
    </button>
    <button class="nav-btn" data-route="settings">
      <span class="nav-ico">⚙</span><span class="nav-label" data-i18n="nav.settings">Podešavanja</span>
    </button>
  </nav>

  <script src="../core/vendor/jspdf.umd.min.js"></script>
  <script src="../core/vendor/font-dejavu.js"></script>
  <script src="../core/js/platform.js"></script>
  <script src="../core/js/models.js"></script>
  <script src="../core/js/store.web.js"></script>
  <script src="../core/js/store.native.js"></script>
  <script src="../core/js/store.js"></script>
  <script src="../core/js/photos.js"></script>
  <script src="../core/js/share.js"></script>
  <script src="../core/js/pdf.js"></script>
  <script src="../core/js/license.js"></script>
  <script src="../core/js/reminders.js"></script>
  <script src="js/app.js"></script>
  <script src="js/workorder.js"></script>
</body>
</html>
