<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autodelovi — Prodaja auto delova</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0D1B2A;
    --gold:  #FFC107;
    --bg:    #F5F5F5;
    --card:  #FFFFFF;
    --text:  #1A1A2E;
    --muted: #6B7280;
    --border:#E5E7EB;
    --green: #10B981;
    --blue:  #3B82F6;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--navy);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header span { font-size: 0.85rem; color: var(--gold); }

  .filters {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filters input, .filters select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    flex: 1;
    min-width: 130px;
  }
  .filters button {
    padding: 8px 20px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .cats {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cat-chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 0.82rem;
    cursor: pointer;
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
  }
  .cat-chip.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }
  .stats { color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  .card-photo {
    width: 100%;
    height: 160px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--muted);
  }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { padding: 12px 14px; }
  .card-title { font-size: 0.97rem; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .card-price { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .card-meta { font-size: 0.8rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { background: var(--bg); border-radius: 4px; padding: 2px 6px; }
  .tag.new-part { background: #D1FAE5; color: #065F46; }
  .tag.used { background: #FEF3C7; color: #92400E; }
  .tag.renoviran { background: #DBEAFE; color: #1E40AF; }

  /* Modal */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    overflow-y: auto;
  }
  .overlay.open { display: flex; align-items: flex-start; justify-content: center; padding: 16px; }

  .modal {
    background: var(--card);
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    margin-top: 20px;
    overflow: hidden;
  }

  .modal-photos { width: 100%; height: 220px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--muted); }
  .modal-photos img { width: 100%; height: 100%; object-fit: cover; }

  .modal-body { padding: 20px; }
  .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  .modal-price { font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .badge { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.83rem; }
  .badge.new-part { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
  .badge.used { background: #FEF3C7; color: #92400E; border-color: #FCD34D; }
  .badge.renoviran { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }

  .section-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .description { font-size: 0.92rem; line-height: 1.6; color: var(--text); margin-bottom: 16px; white-space: pre-wrap; }

  .compat-list { list-style: none; margin-bottom: 16px; }
  .compat-list li { font-size: 0.88rem; padding: 4px 0; color: var(--text); }
  .compat-list li::before { content: '🔧 '; }

  .contact-box {
    background: var(--navy);
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    margin-bottom: 16px;
  }
  .contact-box p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 4px; }
  .contact-box .name { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .contact-box a {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .msg-form { border-top: 1px solid var(--border); padding-top: 16px; }
  .msg-form .section-title { margin-bottom: 10px; }
  .msg-form input, .msg-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
  }
  .msg-form textarea { min-height: 80px; resize: vertical; }
  .msg-form button {
    width: 100%;
    padding: 12px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }
  .msg-sent { color: var(--green); font-size: 0.9rem; text-align: center; padding: 10px; font-weight: 600; }

  .close-btn {
    display: block; width: 100%; padding: 14px;
    text-align: center; background: var(--bg); border: none;
    font-size: 0.9rem; color: var(--muted); cursor: pointer; font-family: inherit;
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { font-size: 1rem; margin-top: 8px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔧 Autodelovi</h1>
    <span>Prodaja auto delova — AutoUniverse</span>
  </div>
</header>

<div class="filters">
  <input type="text" id="f-make" placeholder="Marka (VW, BMW...)">
  <input type="text" id="f-model" placeholder="Model">
  <input type="text" id="f-city" placeholder="Grad">
  <input type="number" id="f-max-price" placeholder="Max cena (EUR)">
  <button onclick="loadParts()">Pretraži</button>
</div>

<div class="cats">
  <div class="cat-chip active" data-cat="" onclick="selectCat(this, '')">Sve</div>
  <div class="cat-chip" data-cat="motor" onclick="selectCat(this, 'motor')">🔩 Motor</div>
  <div class="cat-chip" data-cat="menjac" onclick="selectCat(this, 'menjac')">⚙️ Menjač</div>
  <div class="cat-chip" data-cat="kocnice" onclick="selectCat(this, 'kocnice')">🛑 Kočnice</div>
  <div class="cat-chip" data-cat="trap" onclick="selectCat(this, 'trap')">🔧 Trap</div>
  <div class="cat-chip" data-cat="karoserija" onclick="selectCat(this, 'karoserija')">🚗 Karoserija</div>
  <div class="cat-chip" data-cat="elektrika" onclick="selectCat(this, 'elektrika')">⚡ Elektrika</div>
  <div class="cat-chip" data-cat="klima" onclick="selectCat(this, 'klima')">❄️ Klima</div>
  <div class="cat-chip" data-cat="filteri" onclick="selectCat(this, 'filteri')">🌀 Filteri</div>
  <div class="cat-chip" data-cat="gume" onclick="selectCat(this, 'gume')">🟢 Gume</div>
  <div class="cat-chip" data-cat="stakla" onclick="selectCat(this, 'stakla')">🪟 Stakla</div>
  <div class="cat-chip" data-cat="ostalo" onclick="selectCat(this, 'ostalo')">📦 Ostalo</div>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid">
    <div class="loading">Učitavanje delova...</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-photos" id="modal-photo">🔧</div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="section-title">Opis</div>
      <div class="description" id="modal-desc"></div>
      <div id="modal-compat-section" style="display:none">
        <div class="section-title">Kompatibilnost</div>
        <ul class="compat-list" id="modal-compat"></ul>
      </div>
      <div class="contact-box" id="modal-contact"></div>
      <div class="msg-form" id="msg-form">
        <div class="section-title">Pošalji upit prodavcu</div>
        <input type="text" id="msg-name" placeholder="Vaše ime *">
        <input type="tel" id="msg-phone" placeholder="Vaš telefon">
        <textarea id="msg-content" placeholder="Poruka (npr. da li deo odgovara Golf 7 2016?) *"></textarea>
        <button onclick="sendMessage()">Pošalji upit</button>
        <div class="msg-sent" id="msg-sent" style="display:none">✓ Upit poslat! Prodavac će vas kontaktirati.</div>
      </div>
    </div>
    <button class="close-btn" onclick="closeModal()">Zatvori ✕</button>
  </div>
</div>

<script>
  const API = '';
  let currentPartId = null;
  let activeCategory = '';

  const COND_LABEL = { nov: 'Nov', polovan: 'Polovan', renoviran: 'Renoviran' };
  const COND_CLASS = { nov: 'new-part', polovan: 'used', renoviran: 'renoviran' };

  const CAT_LABEL = {
    motor:'Motor', menjac:'Menjač', kocnice:'Kočnice', trap:'Trap',
    karoserija:'Karoserija', elektrika:'Elektrika', klima:'Klima',
    filteri:'Filteri', gume:'Gume', stakla:'Stakla', ostalo:'Ostalo'
  };

  function fmtPrice(p) {
    return `${Number(p.price).toLocaleString('sr-RS')} ${p.currency}`;
  }

  function selectCat(el, cat) {
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCategory = cat;
    loadParts();
  }

  async function loadParts() {
    document.getElementById('grid').innerHTML = '<div class="loading">Učitavanje...</div>';

    const make  = document.getElementById('f-make').value.trim();
    const model = document.getElementById('f-model').value.trim();
    const city  = document.getElementById('f-city').value.trim();
    const max   = document.getElementById('f-max-price').value.trim();

    const params = new URLSearchParams();
    if (activeCategory) params.set('category', activeCategory);
    if (make)  params.set('make', make);
    if (model) params.set('model', model);
    if (city)  params.set('city', city);
    if (max)   params.set('max_price', max);
    params.set('limit', '40');

    const res = await fetch(`${API}/parts?${params}`);
    const data = await res.json();

    const grid  = document.getElementById('grid');
    const stats = document.getElementById('stats');

    if (!data.length) {
      stats.textContent = '';
      grid.innerHTML = '<div class="empty"><div style="font-size:3rem">🔍</div><p>Nema delova za zadatu pretragu.</p></div>';
      return;
    }

    stats.textContent = `${data.length} oglas${data.length < 5 ? 'a' : 'a'} pronađeno`;

    grid.innerHTML = data.map(p => `
      <div class="card" onclick="openPart(${p.id})">
        <div class="card-photo">
          ${p.photos && p.photos.length > 0
            ? `<img src="${p.photos[0]}" alt="${p.title}" loading="lazy">`
            : '🔧'}
        </div>
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-price">${fmtPrice(p)}</div>
          <div class="card-meta">
            <span class="tag ${COND_CLASS[p.condition] || ''}">${COND_LABEL[p.condition] || p.condition}</span>
            ${p.category ? `<span class="tag">${CAT_LABEL[p.category] || p.category}</span>` : ''}
            ${p.city ? `<span class="tag">📍 ${p.city}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  async function openPart(id) {
    currentPartId = id;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('msg-sent').style.display = 'none';
    document.getElementById('msg-name').value = '';
    document.getElementById('msg-phone').value = '';
    document.getElementById('msg-content').value = '';

    const res = await fetch(`${API}/parts/${id}`);
    const p = await res.json();

    document.getElementById('modal-title').textContent = p.title;
    document.getElementById('modal-price').textContent = fmtPrice(p);

    document.getElementById('modal-photo').innerHTML = p.photos && p.photos.length > 0
      ? `<img src="${p.photos[0]}" alt="${p.title}">`
      : '🔧';

    const meta = [];
    if (p.condition) meta.push(`<span class="badge ${COND_CLASS[p.condition] || ''}">${COND_LABEL[p.condition] || p.condition}</span>`);
    if (p.category)  meta.push(`<span class="badge">${CAT_LABEL[p.category] || p.category}</span>`);
    if (p.part_number) meta.push(`<span class="badge">Kat. br: ${p.part_number}</span>`);
    if (p.city)      meta.push(`<span class="badge">📍 ${p.city}</span>`);
    document.getElementById('modal-meta').innerHTML = meta.join('');

    document.getElementById('modal-desc').textContent = p.description || 'Bez opisa.';

    // Kompatibilnost
    const compatSection = document.getElementById('modal-compat-section');
    const compatList = document.getElementById('modal-compat');
    if (p.compatible && p.compatible.length > 0) {
      compatSection.style.display = 'block';
      compatList.innerHTML = p.compatible.map(c => {
        const years = c.year_from && c.year_to ? ` (${c.year_from}–${c.year_to})` : c.year_from ? ` (od ${c.year_from})` : '';
        return `<li>${c.make} ${c.model || ''}${years}</li>`;
      }).join('');
    } else {
      compatSection.style.display = 'none';
    }

    const contact = document.getElementById('modal-contact');
    const isPhone = p.contact_method !== 'message';
    contact.innerHTML = `
      <p>Kontakt prodavca</p>
      <div class="name">${p.contact_name}</div>
      ${isPhone
        ? `<a href="tel:${p.contact_phone}">📞 Pozovi ${p.contact_phone}</a>`
        : '<span style="font-size:0.85rem;opacity:0.8">Pošalji upit ispod ↓</span>'}
    `;

    document.getElementById('msg-form').style.display = isPhone ? 'none' : 'block';
  }

  async function sendMessage() {
    const name    = document.getElementById('msg-name').value.trim();
    const phone   = document.getElementById('msg-phone').value.trim();
    const content = document.getElementById('msg-content').value.trim();

    if (!name || !content) { alert('Ime i poruka su obavezni.'); return; }

    const res = await fetch(`${API}/parts/${currentPartId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ buyer_name: name, buyer_phone: phone, content })
    });

    if (res.ok) {
      document.getElementById('msg-form').style.display = 'none';
      document.getElementById('msg-sent').style.display = 'block';
    } else {
      alert('Greška. Pokušajte ponovo.');
    }
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('overlay') && e.type !== 'click') return;
    if (e && e.target.closest && e.target.closest('.modal') && e.target !== document.querySelector('.close-btn')) return;
    document.getElementById('overlay').classList.remove('open');
    currentPartId = null;
  }

  const match = location.pathname.match(/\/delovi\/(\d+)/);
  if (match) openPart(match[1]);

  loadParts();
</script>
</body>
</html>
