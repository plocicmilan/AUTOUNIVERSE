# AutoUniverse NGINX config — Sesija 2
# Kopiraj na VPS: /etc/nginx/sites-available/autouniverse
# Aktiviraj: ln -s /etc/nginx/sites-available/autouniverse /etc/nginx/sites-enabled/
# Certbot dodaje SSL blokove automatski.

# --- hub.autouniverse.rs → AU Core :3000 ---
server {
    listen 80;
    server_name hub.autouniverse.rs;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Tajm-auti — WO import može biti sporiji
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # Limit upload (share foto)
    client_max_body_size 10M;
}

# --- autopijaca.autouniverse.rs → Autopijaca :3001 ---
server {
    listen 80;
    server_name autopijaca.autouniverse.rs;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    client_max_body_size 5M;
}

# --- autodelovi.autouniverse.rs → Autodelovi :3002 ---
server {
    listen 80;
    server_name autodelovi.autouniverse.rs;

    location / {
        proxy_pass         http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    client_max_body_size 5M;
}

# --- garage.autouniverse.rs → static PWA ---
server {
    listen 80;
    server_name garage.autouniverse.rs;
    root /var/www/autouniverse/garage;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache za assets, bez cache za HTML i SW
    location ~* \.(js|css|png|jpg|svg|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* (index\.html|sw\.js|manifest\.json)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# --- driver.autouniverse.rs → static PWA ---
server {
    listen 80;
    server_name driver.autouniverse.rs;
    root /var/www/autouniverse/driver;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|woff2|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* (index\.html|sw\.js|manifest\.json)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# --- autouniverse.rs → landing page ---
server {
    listen 80;
    server_name autouniverse.rs www.autouniverse.rs;
    root /var/www/autouniverse/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html)$ {
        expires off;
        add_header Cache-Control "no-store";
    }
}
